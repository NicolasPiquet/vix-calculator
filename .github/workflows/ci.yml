name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install scipy pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=html

      - name: Lint (ruff)
        run: ruff check src/ tests/ scripts/

      - name: Type check (mypy)
        run: |
          mypy src/ --ignore-missing-imports --no-strict-optional --allow-untyped-defs \
            --disable-error-code operator \
            --disable-error-code index \
            --disable-error-code arg-type \
            --disable-error-code return-value \
            --disable-error-code assignment \
            --disable-error-code union-attr \
            --disable-error-code attr-defined

      - name: Check imports
        run: |
          python -c "from src.vix_index import vix_index, vix_index_equity"
          python -c "from src.implied_vol import implied_vol, calibrate_svi, build_iv_surface"
          python -c "from src.skew import compute_skew_metrics, skew_term_structure"
          python -c "from src.pricing import corridor_variance, forward_variance"
          python -c "from src.greeks import variance_decomposition, vega_bucket"
          python -c "from src.backtest import compute_vix_timeseries, realized_vol_close"
